<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0B1F3A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TOPO-CAL"/>
<meta name="description" content="Système de calcul topographique militaire — Forces Armées Royales"/>
<title>TOPO-CAL v4.0 — Forces Armées Royales</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0B1F3A;font-family:'Inter',system-ui,sans-serif;color:#1A2332;overscroll-behavior:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
:root{
  --bg:#F4F6F9;--surface:#fff;--card:#fff;
  --navy:#0B1F3A;--navyLt:#162E54;
  --border:#DDE3EC;--accent:#1A6B3C;--accentLt:#22A05A;--accentBg:#E8F5EE;
  --gold:#B8860B;--goldLt:#D4A017;
  --text:#1A2332;--muted:#6B7A8D;--mutedLt:#A0AABB;
  --danger:#C0392B;--dangerBg:#FDEDEC;
  --shadow:0 2px 12px rgba(11,31,58,.10);
  --shadowMd:0 4px 24px rgba(11,31,58,.14);
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════════════
// MATH CONSTANTS
// ══════════════════════════════════════════════════════
const G2D=360/400,D2G=400/360;
const PWD="1996";

// ══════════════════════════════════════════════════════
// STATE MANAGER
// ══════════════════════════════════════════════════════
let STATE={
  phase:"intro",  // intro | password | app
  page:"home",
  tab:"calculs",
  history:[],
  introTyped:[],
  introPhase:"typing",
  introBar:0,
  introOpacity:1,
  pwdInput:"",
  pwdDots:[false,false,false,false],
  pwdError:false,
  pwdShake:false,
};
function setState(patch){Object.assign(STATE,typeof patch==="function"?patch(STATE):patch);render();}

// ══════════════════════════════════════════════════════
// ROUTER helpers
// ══════════════════════════════════════════════════════
function navigate(p){
  setState({page:p,tab:p==="cours"?"cours":p==="politique"?"politiques":p==="profil"?"profil":"calculs"});
  window.scrollTo(0,0);
}
function addHistory(module,lines){
  setState(s=>({history:[...s.history,{module,lines,ts:Date.now()}]}));
}

// ══════════════════════════════════════════════════════
// SVG SHIELD
// ══════════════════════════════════════════════════════
function shieldSVG(size){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" fill="none">
    <path d="M50 5 L90 22 L90 55 C90 75 72 90 50 97 C28 90 10 75 10 55 L10 22 Z" fill="#162E54" stroke="#D4A017" stroke-width="2.5"/>
    <path d="M50 14 L82 28 L82 55 C82 71 67 83 50 89 C33 83 18 71 18 55 L18 28 Z" fill="#0B1F3A" stroke="#22A05A" stroke-width="1.5"/>
    <line x1="50" y1="28" x2="50" y2="72" stroke="#D4A017" stroke-width="2"/>
    <line x1="30" y1="50" x2="70" y2="50" stroke="#D4A017" stroke-width="2"/>
    <circle cx="50" cy="50" r="13" fill="none" stroke="#22A05A" stroke-width="1.5"/>
    <polygon points="50,30 47,50 50,46 53,50" fill="#D4A017"/>
    <polygon points="50,70 47,50 50,54 53,50" fill="#4A6080"/>
    <text x="50" y="25" text-anchor="middle" fill="#D4A017" font-size="7" font-family="monospace" font-weight="bold">N</text>
    <text x="50" y="79" text-anchor="middle" fill="#4A6080" font-size="6" font-family="monospace">S</text>
    <text x="74" y="53" text-anchor="middle" fill="#4A6080" font-size="6" font-family="monospace">E</text>
    <text x="26" y="53" text-anchor="middle" fill="#4A6080" font-size="6" font-family="monospace">W</text>
    <polygon points="30,18 31.5,22.5 36,22.5 32.5,25.5 34,30 30,27 26,30 27.5,25.5 24,22.5 28.5,22.5" fill="#D4A017"/>
    <polygon points="70,18 71.5,22.5 76,22.5 72.5,25.5 74,30 70,27 66,30 67.5,25.5 64,22.5 68.5,22.5" fill="#D4A017"/>
    <path d="M38 10 L42 16 L50 12 L58 16 L62 10 L60 18 L40 18 Z" fill="#D4A017" opacity="0.9"/>
  </svg>`;
}

// ══════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════
function card(content,style=""){
  return `<div style="background:#fff;border:1px solid #DDE3EC;border-radius:10px;padding:18px 20px;box-shadow:var(--shadow);position:relative;${style}">${content}</div>`;
}
function field(id,label,value,unit="",type="number"){
  return `<div style="margin-bottom:14px">
    <label style="display:block;color:#6B7A8D;font-size:11px;margin-bottom:5px;letter-spacing:.8px;font-weight:600;text-transform:uppercase">${label}</label>
    <div style="position:relative">
      <input id="${id}" type="${type}" value="${value}" placeholder="0.000"
        style="width:100%;box-sizing:border-box;background:#F4F6F9;border:2px solid #DDE3EC;border-radius:8px;padding:10px 44px 10px 14px;color:#1A2332;font-size:14px;font-family:'Courier New',monospace;outline:none"
        onfocus="this.style.borderColor='#0B1F3A';this.style.background='#fff'"
        onblur="this.style.borderColor='#DDE3EC';this.style.background='#F4F6F9'"/>
      ${unit?`<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#1A6B3C;font-size:11px;font-weight:700;pointer-events:none">${unit}</span>`:""}
    </div>
  </div>`;
}
function rr(label,value,hi=false){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;margin-bottom:7px;background:${hi?"#0B1F3A":"#F4F6F9"};border:1px solid ${hi?"#0B1F3A":"#DDE3EC"};border-radius:8px">
    <span style="color:${hi?"#A0AABB":"#6B7A8D"};font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</span>
    <span style="color:${hi?"#fff":"#1A2332"};font-family:'Courier New',monospace;font-weight:700;font-size:15px">${value}</span>
  </div>`;
}
function btn(id,label,variant="navy",full=true){
  const styles={
    navy:"background:#0B1F3A;border:2px solid #0B1F3A;color:#fff",
    green:"background:#1A6B3C;border:2px solid #1A6B3C;color:#fff",
    gold:"background:#D4A017;border:2px solid #D4A017;color:#fff",
    danger:"background:#FDEDEC;border:2px solid #C0392B;color:#C0392B",
    outline:"background:transparent;border:2px solid #0B1F3A;color:#0B1F3A",
  };
  return `<button id="${id}" style="${styles[variant]||styles.navy};width:${full?"100%":"auto"};padding:12px 22px;margin-top:8px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace">${label}</button>`;
}
function backBtn(){
  return `<button onclick="navigate('home')" style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid #0B1F3A;border-radius:8px;padding:7px 16px;color:#0B1F3A;cursor:pointer;font-size:12px;font-family:monospace;letter-spacing:1px;margin-bottom:20px;font-weight:700">← RETOUR</button>`;
}
function secTitle(icon,title,sub=""){
  return `<div style="margin-bottom:20px;border-left:4px solid #1A6B3C;padding-left:14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">${icon}</span>
      <span style="font-family:'Courier New',monospace;font-weight:700;font-size:15px;color:#0B1F3A;letter-spacing:1.5px;text-transform:uppercase">${title}</span>
    </div>
    ${sub?`<p style="color:#6B7A8D;font-size:12px;margin-top:4px;margin-left:30px">${sub}</p>`:""}
  </div>`;
}
function gv(id){return (document.getElementById(id)||{}).value||"";}

// ══════════════════════════════════════════════════════
// INTRO
// ══════════════════════════════════════════════════════
const INTRO_LINES=[
  {text:"المملكة المغربية",size:14,color:"#D4A017",weight:700},
  {text:"القوات المسلحة الملكية",size:16,color:"#D4A017",weight:900},
  {text:"────────────────────────",size:10,color:"rgba(255,255,255,0.12)",weight:400},
  {text:"FORCES ARMÉES ROYALES",size:20,color:"#FFFFFF",weight:900},
  {text:"────────────────────────",size:10,color:"rgba(255,255,255,0.12)",weight:400},
  {text:"TOPOGRAPHIE DE TERRAIN",size:12,color:"rgba(255,255,255,0.5)",weight:400},
  {text:"SYSTÈME TOPO-CAL  v4.0",size:13,color:"#22A05A",weight:700},
];
let introTyped=INTRO_LINES.map(()=>"");
let introLi=0,introCi=0,introAlive=true;

function startIntro(){
  function tick(){
    if(!introAlive) return;
    if(introLi>=INTRO_LINES.length){
      setState({introPhase:"bar"});
      startBar(); return;
    }
    const cur=INTRO_LINES[introLi];
    if(!cur){setState({introPhase:"bar"});startBar();return;}
    introTyped[introLi]=cur.text.slice(0,introCi+1);
    setState({introTyped:[...introTyped]});
    introCi++;
    if(introCi>=cur.text.length){introLi++;introCi=0;setTimeout(tick,120);}
    else setTimeout(tick,28);
  }
  setTimeout(tick,700);
}

let barW=0;
function startBar(){
  const iv=setInterval(()=>{
    barW+=0.5;
    setState({introBar:Math.min(barW,100)});
    if(barW>=100){clearInterval(iv);setState({introPhase:"fadeout"});
      setTimeout(()=>{setState({introOpacity:0});
        setTimeout(()=>setState({phase:"password"}),800);},100);}
  },40);
}

function renderIntro(){
  const {introPhase,introBar,introOpacity}=STATE;
  return `<div style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#061228 0%,#0B1F3A 50%,#061228 100%);
    opacity:${introOpacity};transition:opacity .7s ease">
    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(26,107,60,.15) 0%,transparent 65%)"></div>
    <div style="position:relative;z-index:2;text-align:center;width:100%;max-width:480px;padding:0 32px">
      <div style="display:flex;justify-content:center;margin-bottom:36px;filter:drop-shadow(0 0 40px rgba(212,160,23,.6))">
        ${shieldSVG(110)}
      </div>
      <div style="margin-bottom:28px">
        ${INTRO_LINES.map((l,i)=>`
          <div style="font-family:'Courier New',monospace;font-size:${l.size}px;font-weight:${l.weight};color:${l.color};
            letter-spacing:${i===3?5:3}px;text-transform:uppercase;margin-bottom:${i===3?14:i===1?6:4}px;
            min-height:${l.size+10}px;text-shadow:${[3].includes(i)?`0 0 30px ${l.color}88`:'none'}">
            ${STATE.introTyped[i]||""}${introPhase==="typing"&&(STATE.introTyped[i]||"").length>0&&(STATE.introTyped[i]||"").length<l.text.length?'<span style="animation:blink .55s step-end infinite">█</span>':""}
          </div>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div style="flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.2))"></div>
        <span style="color:#D4A017;font-size:16px">✦</span>
        <div style="flex:1;height:1px;background:linear-gradient(to left,transparent,rgba(255,255,255,.2))"></div>
      </div>
      ${introPhase!=="typing"?`
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="color:rgba(255,255,255,.4);font-size:10px;font-family:monospace;letter-spacing:2px">INITIALISATION DU SYSTÈME</span>
            <span style="color:#22A05A;font-size:10px;font-family:monospace;font-weight:700">${Math.floor(introBar)}%</span>
          </div>
          <div style="height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${introBar}%;background:linear-gradient(to right,#1A6B3C,#22A05A,#D4A017);box-shadow:0 0 12px rgba(34,160,90,.6);transition:width .08s linear"></div>
          </div>
        </div>`:""}
      <div style="border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 20px;display:inline-block">
        <span style="color:rgba(255,255,255,.3);font-size:9px;font-family:monospace;letter-spacing:3px;text-transform:uppercase">خدمة الوطن — AU SERVICE DE LA PATRIE</span>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// PASSWORD
// ══════════════════════════════════════════════════════
function renderPassword(){
  const {pwdDots,pwdError,pwdShake}=STATE;
  return `<div style="min-height:100vh;background:linear-gradient(160deg,#061228 0%,#0B1F3A 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div style="position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,rgba(26,107,60,.12) 0%,transparent 65%)"></div>
    <div style="position:relative;z-index:2;text-align:center;width:100%;max-width:320px;padding:0 28px">
      <div style="display:flex;justify-content:center;margin-bottom:24px;filter:drop-shadow(0 0 24px rgba(212,160,23,.5))">
        ${shieldSVG(76)}
      </div>
      <p style="color:#D4A017;font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:4px">TOPO-CAL v4.0</p>
      <p style="color:rgba(255,255,255,.35);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:monospace;margin-bottom:36px">CODE D'ACCÈS REQUIS</p>
      <div style="display:flex;justify-content:center;gap:20px;margin-bottom:32px;${pwdShake?"animation:shake .5s ease":""}" id="pwd-dots">
        ${pwdDots.map((f,i)=>`<div style="width:18px;height:18px;border-radius:50%;
          background:${f?(pwdError?"#C0392B":"#D4A017"):"transparent"};
          border:2.5px solid ${f?(pwdError?"#C0392B":"#D4A017"):"rgba(255,255,255,.2)"};
          transition:all .15s;box-shadow:${f&&!pwdError?"0 0 12px rgba(212,160,23,.6)":"none"}"></div>`).join("")}
      </div>
      ${pwdError?`<p style="color:#E74C3C;font-size:11px;letter-spacing:2px;margin-bottom:14px;font-family:monospace">⚠ CODE INCORRECT</p>`:""}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px">
        ${["1","2","3","4","5","6","7","8","9","⌫","0",""].map((k,i)=>{
          if(k==="") return `<div></div>`;
          const isBack=k==="⌫";
          return `<button onclick="${isBack?"pwdDel()":"pwdPress('"+k+"')"}" style="padding:18px 0;
            background:${isBack?"rgba(192,57,43,.15)":"rgba(255,255,255,.06)"};
            border:1.5px solid ${isBack?"rgba(192,57,43,.4)":"rgba(255,255,255,.15)"};
            border-radius:10px;color:${isBack?"#E74C3C":"rgba(255,255,255,.9)"};
            font-size:${isBack?18:24}px;font-family:'Courier New',monospace;
            font-weight:700;cursor:pointer">${k}</button>`;
        }).join("")}
      </div>
      <p style="color:rgba(255,255,255,.12);font-size:9px;letter-spacing:3px;text-transform:uppercase;font-family:monospace">القوات المسلحة الملكية</p>
    </div>
  </div>`;
}

function pwdPress(d){
  if(STATE.pwdInput.length>=4) return;
  const next=STATE.pwdInput+d;
  const dots=[false,false,false,false];
  for(let i=0;i<next.length;i++) dots[i]=true;
  setState({pwdInput:next,pwdDots:dots,pwdError:false});
  if(next.length===4){
    setTimeout(()=>{
      if(next===PWD){setState({phase:"app",pwdInput:"",pwdDots:[false,false,false,false]});}
      else{
        setState({pwdError:true,pwdShake:true});
        setTimeout(()=>setState({pwdInput:"",pwdDots:[false,false,false,false],pwdError:false,pwdShake:false}),900);
      }
    },200);
  }
}
function pwdDel(){
  const next=STATE.pwdInput.slice(0,-1);
  const dots=[false,false,false,false];
  for(let i=0;i<next.length;i++) dots[i]=true;
  setState({pwdInput:next,pwdDots:dots});
}

// ══════════════════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════════════════
const MODULES=[
  {id:"gis",icon:"📐",title:"Gisement & Distance",desc:"Gisement et distance entre deux points",badge:"Calcul",bc:"navy"},
  {id:"mire",icon:"📏",title:"Lecture de Mire",desc:"Dénivelée, HI et distance stadimétrique",badge:"Terrain",bc:"navy"},
  {id:"coord",icon:"🗺️",title:"Coordonnées",desc:"Coordonnées depuis gisement et distance",badge:"Calcul",bc:"navy"},
  {id:"conv",icon:"🔄",title:"Convertisseur",desc:"Grad ↔ Milligrad ↔ Degré ↔ Radian",badge:"Outil",bc:"navy"},
  {id:"niv",icon:"📉",title:"Nivellement",desc:"Altitudes par cheminement",badge:"Terrain",bc:"navy"},
  {id:"surf",icon:"⬛",title:"Surface",desc:"Superficie d'un polygone",badge:"Calcul",bc:"navy"},
  {id:"impl",icon:"🎯",title:"Implantation",desc:"Éléments depuis une station",badge:"Terrain",bc:"navy"},
  {id:"rayon",icon:"⭕",title:"Rayonnement",desc:"Coordonnées par rayonnement polaire",badge:"Calcul",bc:"navy"},
  {id:"recoup",icon:"✂️",title:"Recoupement",desc:"Point inconnu par intersection",badge:"Avancé",bc:"gold"},
  {id:"canevas",icon:"🔲",title:"Canevas Polygonal",desc:"Polygonale fermée avec compensation",badge:"Avancé",bc:"gold"},
  {id:"drone",icon:"🚁",title:"Drone / Photogrammétrie",desc:"GSD, fauchée et planification de vol",badge:"Drone",bc:"green"},
  {id:"hist",icon:"📋",title:"Historique & Export",desc:"Tous vos calculs — Export TXT/CSV",badge:"Session",bc:"navy"},
];

function badgeStyle(bc){
  if(bc==="green") return "background:#E8F5EE;color:#1A6B3C;border:1px solid rgba(26,107,60,.3)";
  if(bc==="gold") return "background:#FEF9E7;color:#B8860B;border:1px solid rgba(184,134,11,.3)";
  return "background:rgba(11,31,58,.08);color:#0B1F3A;border:1px solid rgba(11,31,58,.15)";
}

function renderHome(){
  const recent=STATE.history.slice(-3).reverse();
  return `<div class="page">
    <!-- Hero -->
    <div style="background:linear-gradient(135deg,#0B1F3A 0%,#162E54 100%);border-radius:14px;padding:26px 22px;margin-bottom:18px;box-shadow:var(--shadowMd);position:relative;overflow:hidden">
      <div style="position:absolute;right:-30px;top:-30px;opacity:.06">${shieldSVG(200)}</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        ${shieldSVG(52)}
        <div>
          <div style="display:flex;align-items:baseline;gap:10px">
            <h1 style="font-family:'Courier New',monospace;font-weight:900;font-size:22px;color:#fff;letter-spacing:4px;margin:0">TOPO-CAL</h1>
            <span style="background:#FEF9E7;color:#B8860B;border:1px solid rgba(184,134,11,.3);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;font-family:monospace;letter-spacing:.8px">v4.0</span>
          </div>
          <p style="color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;font-family:monospace;text-transform:uppercase;margin:2px 0 0">Forces Armées Royales</p>
        </div>
      </div>
      <p style="color:rgba(255,255,255,.65);font-size:13px;line-height:1.7;margin-bottom:16px">
        Système de calcul topographique militaire — conçu pour les opérations de terrain, cartographie et mesures de précision.
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${[["12","Modules"],["10s","Intro"],["TXT/CSV","Export"],["OSM","Cartes"]].map(([v,l])=>`
          <div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 12px;text-align:center">
            <p style="color:#fff;font-family:monospace;font-weight:700;font-size:13px;margin:0">${v}</p>
            <p style="color:rgba(255,255,255,.4);font-size:9px;letter-spacing:1px;margin:0;text-transform:uppercase">${l}</p>
          </div>`).join("")}
      </div>
    </div>

    <!-- Quick -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      ${[{id:"cours",icon:"📚",label:"Cours & Théorie",c:"#0B1F3A"},{id:"politique",icon:"📋",label:"Politiques",c:"#1A6B3C"}].map(q=>`

// Each module has its own local state stored in modState
let modState={};
function ms(key,def){if(modState[key]===undefined)modState[key]=def;return modState[key];}
function mset(key,val){modState[key]=val;render();}

// Helper: get array state
function getArr(key,def){if(!modState[key])modState[key]=def.map((x,i)=>({...x,id:i+1}));return modState[key];}

function renderGis(){
  const res=ms("gis_res",null);
  return `<div class="page">
    ${backBtn()}
    ${secTitle("📐","Gisement & Distance","Calcul du gisement et de la distance entre deux points")}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      ${card(`<p style="color:#0B1F3A;font-size:11px;font-family:monospace;font-weight:700;letter-spacing:1px;margin-bottom:12px">◈ POINT A</p>
        ${field("gx1","X1 — Est",ms("gx1",""),"m")}${field("gy1","Y1 — Nord",ms("gy1",""),"m")}`)}
      ${card(`<p style="color:#1A6B3C;font-size:11px;font-family:monospace;font-weight:700;letter-spacing:1px;margin-bottom:12px">◈ POINT B</p>
        ${field("gx2","X2 — Est",ms("gx2",""),"m")}${field("gy2","Y2 — Nord",ms("gy2",""),"m")}`)}
    </div>
    ${btn("btn-gis","⚡ Calculer")}
    ${res?`<div style="margin-top:18px">${rr("Distance",res.dist+" m",true)}${rr("Gisement (grad)",res.grad+" gr",true)}${rr("Gisement (mgr)",res.mgr+" mgr")}${rr("Gisement (degrés)",res.deg+" °")}${rr("ΔX",res.dx+" m")}${rr("ΔY",res.dy+" m")}</div>`:""}
  </div>`;
}
function calcGis(){
  ["gx1","gy1","gx2","gy2"].forEach(k=>mset(k,gv(k)));
  const [X1,Y1,X2,Y2]=[ms("gx1",""),ms("gy1",""),ms("gx2",""),ms("gy2","")].map(Number);
  if([X1,Y1,X2,Y2].some(isNaN)){render();return;}
  const dx=X2-X1,dy=Y2-Y1;
  let rad=Math.atan2(dx,dy);if(rad<0)rad+=2*Math.PI;

function calcRecoup(){
  ["rec_ax","rec_ay","rec_ga","rec_bx","rec_by","rec_gb"].forEach(k=>mset(k,gv(k)));
  const AX=+ms("rec_ax",""),AY=+ms("rec_ay",""),GA=+ms("rec_ga","");
  const BX=+ms("rec_bx",""),BY=+ms("rec_by",""),GB=+ms("rec_gb","");
  if([AX,AY,GA,BX,BY,GB].some(isNaN)){render();return;}
  const gaR=GA*G2D*Math.PI/180,gbR=GB*G2D*Math.PI/180;
  const tanA=Math.tan(gaR),tanB=Math.tan(gbR);
  if(Math.abs(tanA-tanB)<1e-10){render();return;}
  const x=(AY-BY+BX*tanB-AX*tanA)/(tanB-tanA);
  const y=AY+tanA*(x-AX);
  mset("recoup_res",{x:x.toFixed(4),y:y.toFixed(4)});
  addHistory("Recoupement",[`A(${AX},${AY}) G=${GA}gr | B(${BX},${BY}) G=${GB}gr`,`P: X=${x.toFixed(4)} | Y=${y.toFixed(4)} m`]);
}

function calcDrone(){
  ["drone_alt","drone_fov","drone_ovl","drone_vit","drone_bat","drone_lat","drone_lng"].forEach(k=>mset(k,gv(k)));
  const ALT=+ms("drone_alt",""),FOV=+ms("drone_fov","90"),OVL=+ms("drone_ovl","80"),VIT=+ms("drone_vit",""),BAT=+ms("drone_bat","");

  const gsd=(ALT*6.16)/(3.6*4000)*100;

  const esp=fauchee*(1-OVL/100);
  const auto=!isNaN(BAT)&&!isNaN(VIT)?(BAT/60*VIT).toFixed(1):"—";
  const surf=!isNaN(BAT)&&!isNaN(VIT)?((BAT/60*VIT)*esp/10000).toFixed(4):"—";
  mset("drone_res",{gsd:gsd.toFixed(2),fauchee:fauchee.toFixed(1),esp:esp.toFixed(1),auto,surf});

}

    <div style="border-top:1px solid #DDE3EC;padding:10px 20px;text-align:center;font-family:monospace;font-size:9px;color:#A0AABB;letter-spacing:2px;background:#fff">
      TOPO-CAL v4.0 — CPL MOHAMED DAOUDI — 2ÈME GARDE — FAR
    </div>
  </div>`;
}

function switchTab(id){
  const page=id==="calculs"?"home":id==="cours"?"cours":id==="politiques"?"politique":"profil";
  setState({tab:id,page});
  selectedCours=null;
  window.scrollTo(0,0);
}

// EVENT WIRING
// ══════════════════════════════════════════════════════
function wireEvents(){
  // Gisement
  document.getElementById("btn-gis")?.addEventListener("click",calcGis);
  // Mire
  document.getElementById("btn-mire")?.addEventListener("click",calcMire);
  // Conv
  document.getElementById("btn-conv")?.addEventListener("click",calcConv);
  // Niv
  document.getElementById("btn-niv")?.addEventListener("click",calcNiv);
  // Surf
  document.getElementById("btn-surf")?.addEventListener("click",calcSurf);
  // Impl
  document.getElementById("btn-impl")?.addEventListener("click",calcImpl);
  // Rayon
  document.getElementById("btn-rayon")?.addEventListener("click",calcRayon);
  // Recoup
  document.getElementById("btn-recoup")?.addEventListener("click",calcRecoup);
  // Canevas
  document.getElementById("btn-canevas")?.addEventListener("click",calcCanevas);
  // Drone
  document.getElementById("btn-drone")?.addEventListener("click",calcDrone);
  // Coord
  document.getElementById("btn-coord")?.addEventListener("click",calcCoord);
}

// ══════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  const {phase}=STATE;
  if(phase==="intro") root.innerHTML=renderIntro();
  else if(phase==="password") root.innerHTML=renderPassword();
  else root.innerHTML=renderApp();
  wireEvents();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
STATE.introTyped=INTRO_LINES.map(()=>"");
render();
startIntro();

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
